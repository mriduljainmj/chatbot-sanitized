# ===============================
# Application
# ===============================
spring.application.name=chatbot-backend
server.port=8080

# ===============================
# Snowflake JDBC Datasource
# ===============================
spring.datasource.driver-class-name=net.snowflake.client.jdbc.SnowflakeDriver
spring.datasource.url=jdbc:snowflake://SGIMUHZ-OR86708.snowflakecomputing.com
spring.datasource.username=CHATBOT_USER
spring.datasource.password=Mango@123

# ===============================
# Hikari Connection Pool
# ===============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=300000

# ===============================
# Snowflake Context (REQUIRED)
# ===============================
snowflake.warehouse=CHATBOT_WH
snowflake.database=CHATBOT_DB
snowflake.schema=APP

# ===============================
# Actuator (Optional)
# ===============================
management.endpoints.web.exposure.include=health,info